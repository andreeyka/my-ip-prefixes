name: Update not-CIS prefixes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sing-box
        env:
          SING_BOX_VERSION: "1.12.13"
        run: |
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box_${SING_BOX_VERSION}_linux_amd64.deb" -O sing-box.deb
          sudo dpkg -i sing-box.deb
          rm sing-box.deb
          sing-box version

      - uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install

      - name: Generate not-cis.srs
        run: uv run main.py -o not-cis.json -c

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add not-cis.srs
          git diff --cached --quiet || git commit -m "Auto-update not-cis.srs"
          git push
